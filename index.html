<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Пятнашки</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app">
    <section class="hero">
      <p class="eyebrow">Веб-игра</p>
      <h1>Пятнашки</h1>
      <p class="subtitle">
        Перемещайте плитки, собирайте числа по порядку и попробуйте решить поле как можно быстрее.
      </p>
      <form class="player-form" id="playerForm">
        <label class="input-label" for="playerName">Игрок</label>
        <div class="player-row">
          <input
            class="player-input"
            id="playerName"
            name="playerName"
            type="text"
            maxlength="24"
            placeholder="Введите имя"
            autocomplete="nickname"
          >
          <button class="button button-primary" type="submit">Старт</button>
        </div>
      </form>
      <div class="stats">
        <div class="stat-card">
          <span class="stat-label">Ходы</span>
          <span class="stat-value" id="moves">0</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">Время</span>
          <span class="stat-value" id="timer">00:00</span>
        </div>
      </div>
      <div class="actions">
        <button class="button button-primary" id="shuffleButton">Новая игра</button>
        <button class="button button-secondary" id="hintButton">Подсказка</button>
      </div>
      <p class="hint" id="message">Нажмите «Новая игра», чтобы перемешать поле.</p>
      <section class="leaderboard">
        <div class="leaderboard-header">
          <h2>Таблица рекордов</h2>
          <span class="leaderboard-note">Топ-7 результатов</span>
        </div>
        <div class="leaderboard-table" id="leaderboard"></div>
      </section>
    </section>

    <section class="board-panel">
      <div class="board-frame">
        <div class="board" id="board" aria-label="Игровое поле пятнашек"></div>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
